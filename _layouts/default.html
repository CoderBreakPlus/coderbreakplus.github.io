<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  
  <!-- MathJax 配置 - LaTeX 渲染核心 -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],   // 行内公式
        displayMath: [['$$', '$$'], ['\\[', '\\]']] // 块级公式
      },
      svg: {
        fontCache: 'global'
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
      }
    };
  </script>
  <script type="text/javascript" id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js">
  </script>
  
  <style>
    /* 全局样式 - 内容居中 */
    body {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      line-height: 1.8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      font-size: 18px;
      color: #1a1a1a;
      background-color: #fff;
    }
    
    /* 导航容器 */
    .nav-container {
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 1px solid #eaecef;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    /* 返回按钮样式 */
    .back-button {
      display: inline-block;
      padding: 6px 14px;
      background-color: #f6f8fa;
      color: #0969da;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid #d0d7de;
      transition: all 0.2s ease;
    }
    
    .back-button:hover {
      background-color: #f0f3f6;
      border-color: #0969da;
      text-decoration: none;
    }
    
    /* 标题样式 */
    h1 {
      font-size: 2em;
      border-bottom: 1px solid #eaecef;
      padding-bottom: 0.3em;
      margin-top: 24px;
      margin-bottom: 16px;
    }
    
    h2 {
      font-size: 1.5em;
      border-bottom: 1px solid #eaecef;
      padding-bottom: 0.3em;
      margin-top: 24px;
      margin-bottom: 16px;
    }
    
    h3 {
      font-size: 1.25em;
      margin-top: 24px;
      margin-bottom: 16px;
    }
    
    /* 段落 */
    p {
      margin-bottom: 1.2em;
    }
    
    /* 链接样式 */
    a {
      color: #0969da;
      text-decoration: none;
    }
    
    a:hover {
      text-decoration: underline;
    }
    
    /* 图片居中 */
    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 1.5em auto;
      border-radius: 4px;
    }
    
    /* 代码块 */
    pre {
      background-color: #f6f8fa;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 14px;
      line-height: 1.45;
    }
    
    code {
      background-color: #f6f8fa;
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-size: 85%;
      font-family: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", monospace;
    }
    
    pre code {
      background-color: transparent;
      padding: 0;
    }
    
    /* 引用块 */
    blockquote {
      border-left: 4px solid #d0d7de;
      padding-left: 1em;
      margin-left: 0;
      color: #57606a;
    }
    
    /* 表格 */
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
      overflow-x: auto;
      display: block;
    }
    
    th, td {
      border: 1px solid #d0d7de;
      padding: 8px 12px;
      text-align: left;
    }
    
    th {
      background-color: #f6f8fa;
    }
    
    /* 列表 */
    ul, ol {
      padding-left: 2em;
      margin-bottom: 1.2em;
    }
    
    li {
      margin: 0.25em 0;
    }
    
    /* 水平分割线 */
    hr {
      border: none;
      border-top: 1px solid #eaecef;
      margin: 24px 0;
    }
    
    /* 浮动返回顶部按钮 */
    .float-buttons {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 1000;
    }
    
    .float-btn {
      width: 44px;
      height: 44px;
      background-color: #fff;
      color: #0969da;
      border: 1px solid #d0d7de;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: all 0.2s ease;
    }
    
    .float-btn:hover {
      background-color: #f0f3f6;
      border-color: #0969da;
      transform: translateY(-2px);
    }
    
    /* 响应式设计 - 移动端适配 */
    @media (max-width: 768px) {
      body {
        padding: 16px;
        font-size: 16px;
      }
      
      .float-buttons {
        bottom: 16px;
        right: 16px;
      }
      
      .float-btn {
        width: 40px;
        height: 40px;
        font-size: 18px;
      }
    }
    
    /* MathJax 公式样式微调 */
    mjx-container {
      overflow-x: auto;
      overflow-y: hidden;
      margin: 0.5em 0;
    }
  </style>
</head>
<body>
  <!-- 顶部导航栏 - 返回按钮 -->
  <div class="nav-container">
    <a href="javascript:history.back()" class="back-button" title="返回上一页">
      ← 返回上一页
    </a>
    <a href="{{ site.baseurl | default: '/' }}" class="back-button" title="返回首页">
      🏠 返回首页
    </a>
  </div>
  
  <!-- 主要内容区域 -->
  <main>
    {{ content }}
  </main>
  
  <!-- 浮动按钮组 -->
  <div class="float-buttons">
    <a href="javascript:history.back()" class="float-btn" title="返回上一页">
      ←
    </a>
    <a href="#" onclick="window.scrollTo({top: 0, behavior: 'smooth'}); return false;" class="float-btn" title="返回顶部">
      ↑
    </a>
  </div>
  
  <!-- 确保 MathJax 在页面加载后重新渲染动态内容 -->
  <script>
    // 如果页面有动态加载的内容，可以调用此函数重新渲染公式
    if (typeof MathJax !== 'undefined') {
      MathJax.startup = MathJax.startup || {};
      MathJax.startup.pageReady = function() {
        return MathJax.typesetPromise();
      };
    }
  </script>
</body>
</html>
